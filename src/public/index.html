<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Referral Dashboard — Referral Link Generator</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--primary:#171717;--on-primary:#fff;--ink:#171717;--body:#4d4d4d;--mute:#888;--hairline:#ebebeb;--canvas:#fff;--canvas-soft:#fafafa;--canvas-soft-2:#f5f5f5;--link:#0070f3;--radius-sm:6px;--radius-md:8px;--radius-lg:12px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,-apple-system,sans-serif;font-weight:400;color:var(--ink);background:var(--canvas-soft);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased}
a{color:var(--link);font-weight:500;text-decoration:none}
a:hover{text-decoration:underline}
code{font-family:Geist Mono,ui-monospace,monospace;font-size:.875em}
header{background:#fff;border-bottom:1px solid var(--hairline);padding:16px 32px;display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:600}
header span{font-size:13px;color:var(--mute)}
.container{max-width:960px;margin:0 auto;padding:32px 16px}
.setup{background:#fff;border:1px solid var(--hairline);border-radius:var(--radius-md);padding:24px;margin-bottom:24px;display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:180px}
.field label{font-size:12px;font-weight:500;color:var(--mute);text-transform:uppercase;letter-spacing:.04em}
.field input{border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;outline:none;transition:border-color .15s;font-family:inherit}
.field input:focus{border-color:var(--link)}
button{background:var(--primary);color:var(--on-primary);border:none;border-radius:var(--radius-sm);padding:10px 18px;font-size:14px;font-weight:500;cursor:pointer;transition:background .15s;white-space:nowrap;font-family:inherit}
button:hover{background:var(--ink)}
button.secondary{background:var(--canvas-soft-2);color:var(--ink)}
button.secondary:hover{background:var(--hairline)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
@media(max-width:639px){.stats{grid-template-columns:repeat(2,1fr)}}
.stat{background:#fff;border:1px solid var(--hairline);border-radius:var(--radius-md);padding:20px}
.stat-label{font-size:12px;color:var(--mute);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px}
.stat-value{font-size:28px;font-weight:600;color:var(--ink);letter-spacing:-.56px}
.stat-sub{font-size:12px;color:var(--mute);margin-top:4px}
.panel{background:#fff;border:1px solid var(--hairline);border-radius:var(--radius-md);padding:24px;margin-bottom:24px}
.panel h2{font-size:16px;font-weight:600;margin-bottom:16px}
.panel .field-group{display:flex;gap:12px;align-items:flex-end;flex-wrap:wrap}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{padding:12px 16px;text-align:left;border-bottom:1px solid var(--hairline)}
th{font-weight:500;color:var(--mute);font-size:12px;text-transform:uppercase;letter-spacing:.04em}
td{color:var(--body)}
a{color:var(--link)}
.copy-btn{background:none;border:1px solid var(--hairline);border-radius:var(--radius-sm);padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;color:var(--body)}
.copy-btn:hover{background:var(--canvas-soft);border-color:var(--mute)}
</style>
</head>
<body>
<header>
<h1>Referral Dashboard</h1>
<span>reflinkgen.com</span>
</header>
<div class="container" id="app">
<div class="setup">
<div class="field">
<label for="productId">Product ID</label>
<input id="productId" type="text" placeholder="my-saas-app" value="demo-app">
</div>
<button onclick="refreshDashboard()">Load dashboard</button>
<button class="secondary" onclick="generateLink()">Generate link</button>
</div>
<div class="stats">
<div class="stat"><div class="stat-label">Total links</div><div class="stat-value" id="stat-links">—</div><div class="stat-sub">All time</div></div>
<div class="stat"><div class="stat-label">Clicks</div><div class="stat-value" id="stat-clicks">—</div><div class="stat-sub">All time</div></div>
<div class="stat"><div class="stat-label">Conversions</div><div class="stat-value" id="stat-conversions">—</div><div class="stat-sub">All time</div></div>
<div class="stat"><div class="stat-label">Referral revenue</div><div class="stat-value" id="stat-revenue">—</div><div class="stat-sub">This month</div></div>
</div>
<div class="panel">
<h2>Generate a referral link</h2>
<div class="field-group">
<div class="field">
<label for="ref-email">Referrer email</label>
<input id="ref-email" type="email" placeholder="user@example.com">
</div>
<button onclick="generateLink()">Generate</button>
</div>
<div id="link-result" style="margin-top:16px;display:none">
<p style="font-size:13px;color:var(--mute);margin-bottom:8px">Referral link:</p>
<code id="ref-link" style="display:block;padding:12px;background:var(--canvas-soft-2);border:1px solid var(--hairline);border-radius:var(--radius-sm);font-size:14px;word-break:break-all"></code>
<button class="copy-btn" style="margin-top:8px" onclick="copyLink()">Copy link</button>
</div>
</div>
<div class="panel">
<h2>All referral links</h2>
<div class="table-wrap">
<table>
<thead><tr><th>Email</th><th>Code</th><th>Link</th><th>Clicks</th><th>Conversions</th><th>Reward</th></tr></thead>
<tbody id="links-table"><tr><td colspan="6" style="text-align:center;color:var(--mute);padding:32px;font-size:13px">Enter a Product ID and click "Load dashboard"</td></tr></tbody>
</table>
</div>
</div>
</div>
<script>
const API_BASE = location.origin;
async function api(path) { const r=await fetch(API_BASE+path); if(!r.ok) throw await r.text(); return r.json(); }
let currentProductId = 'demo-app';
let currentLinks = [];

async function refreshDashboard() {
const pid = document.getElementById('productId').value.trim();
if (!pid) return alert('Enter a Product ID');
currentProductId = pid;
try {
const links = await api('/api/links?productId='+encodeURIComponent(pid));
currentLinks = links;
renderLinks(links);
const stats = await api('/api/stats/'+encodeURIComponent(pid));
document.getElementById('stat-links').textContent = stats.totalLinks || 0;
document.getElementById('stat-clicks').textContent = stats.totalClicks || 0;
document.getElementById('stat-conversions').textContent = stats.totalConversions || 0;
document.getElementById('stat-revenue').textContent = '$' + ((stats.totalRewards||0)/100).toFixed(2);
} catch(e) { alert('Error: '+e); }
}

function renderLinks(links) {
const tbody = document.getElementById('links-table');
if (!links.length) { tbody.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--mute);padding:32px;font-size:13px">No links yet. Generate one above.</td></tr>'; return; }
tbody.innerHTML = links.map(l => `<tr>
<td style="font-weight:500;color:var(--ink)">${esc(l.referrer_email||'—')}</td>
<td><code>${esc(l.code)}</code></td>
<td><a href="/ref/${esc(l.code)}" target="_blank" style="font-size:13px">/ref/${esc(l.code)}</a></td>
<td>${l.clicks||0}</td>
<td>${l.conversions||0}</td>
<td>$${((l.reward_balance||0)/100).toFixed(2)}</td>
</tr>`).join('');
}

async function generateLink() {
const email = document.getElementById('ref-email').value.trim();
if (!email) return alert('Enter a referrer email');
try {
const r = await fetch(API_BASE+'/api/links', {
method:'POST',
headers:{'Content-Type':'application/json'},
body: JSON.stringify({ productId: currentProductId, referrerEmail: email })
});
const data = await r.json();
document.getElementById('ref-link').textContent = window.location.origin + '/ref/' + data.code;
document.getElementById('link-result').style.display = 'block';
refreshDashboard();
} catch(e) { alert('Error: '+e); }
}

function copyLink() {
const el = document.getElementById('ref-link');
navigator.clipboard.writeText(el.textContent).then(() => {
const btn = document.querySelector('.copy-btn');
btn.textContent = 'Copied!';
setTimeout(()=>btn.textContent='Copy link',2000);
});
}

function esc(s) { const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

refreshDashboard();
</script>
<script defer data-domain="reflinkgen.com" src="https://plausible.io/js/script.js"></script>
</body>
</html>
